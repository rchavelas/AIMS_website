<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#00305f"/>

  <!-- Chip frame -->
  <rect x="8" y="8" width="16" height="16" rx="2" fill="none" stroke="white" stroke-width="1.5" opacity="0.85"/>

  <!-- Pins — left -->
  <rect x="4.5" y="11" width="3.5" height="2" rx="0.75" fill="white" opacity="0.65"/>
  <rect x="4.5" y="19" width="3.5" height="2" rx="0.75" fill="white" opacity="0.65"/>

  <!-- Pins — right -->
  <rect x="24" y="11" width="3.5" height="2" rx="0.75" fill="white" opacity="0.65"/>
  <rect x="24" y="19" width="3.5" height="2" rx="0.75" fill="white" opacity="0.65"/>

  <!-- Pins — top -->
  <rect x="11" y="4.5" width="2" height="3.5" rx="0.75" fill="white" opacity="0.65"/>
  <rect x="19" y="4.5" width="2" height="3.5" rx="0.75" fill="white" opacity="0.65"/>

  <!-- Pins — bottom -->
  <rect x="11" y="24" width="2" height="3.5" rx="0.75" fill="white" opacity="0.65"/>
  <rect x="19" y="24" width="2" height="3.5" rx="0.75" fill="white" opacity="0.65"/>

  <!-- Neural connections to centre -->
  <line x1="12.5" y1="12.5" x2="16" y2="16" stroke="white" stroke-width="1.1" opacity="0.55"/>
  <line x1="19.5" y1="12.5" x2="16" y2="16" stroke="white" stroke-width="1.1" opacity="0.55"/>
  <line x1="12.5" y1="19.5" x2="16" y2="16" stroke="white" stroke-width="1.1" opacity="0.55"/>
  <line x1="19.5" y1="19.5" x2="16" y2="16" stroke="white" stroke-width="1.1" opacity="0.55"/>

  <!-- Corner nodes (supply chain facilities / neural inputs) -->
  <circle cx="12.5" cy="12.5" r="1.75" fill="white"/>
  <circle cx="19.5" cy="12.5" r="1.75" fill="white"/>
  <circle cx="12.5" cy="19.5" r="1.75" fill="white"/>
  <circle cx="19.5" cy="19.5" r="1.75" fill="white"/>

  <!-- Central hub — AI brain / distribution core -->
  <circle cx="16" cy="16" r="3.25" fill="#e85a2c"/>
  <circle cx="16" cy="16" r="1.25" fill="white" opacity="0.9"/>
</svg>
